[profile.default]
# doctest は nextest 非対応 → `cargo test --doc` で別途実行。
test-threads = "num-cpus"
# slow-timeout.period 60s, terminate-after 3 → 180s で kill (CLAUDE.md 3min cap)。
slow-timeout = { period = "60s", terminate-after = 3 }

# bench data 不在環境で lib/bin のみ走らせる用。integration は data を assert で要求。
[profile.lib-only]
default-filter = "kind(lib) + kind(bin)"
test-threads = "num-cpus"
slow-timeout = { period = "60s", terminate-after = 2 }

# CPU 時間 sensitive な faer per-call parallelism sentinel (#31) は
# CPU を独占しないと par scaling が安定しない (他 test と並走で wall noise)。
# threads-required = "num-cpus" で各 sentinel test が全 CPU を要求 →
# 他 test と排他、par_sentinel test 同士も serialize される。
[[profile.default.overrides]]
filter = "test(linalg::par_sentinel::)"
threads-required = "num-cpus"

# Memory-heavy qplib parse tests each peak ~100 MB (parsing QPLIB_8500, 25 MB
# / ~2 M NZ). Running them concurrently stacks to ~300 MB and, under broader
# suite contention with swap=0, can thrash and trip slow-timeout (the original
# 72.985s SIGTERM). Serialize them so at most one runs at a time; the fix is
# test isolation, not skipping large files.
[test-groups]
qplib-memory-heavy = { max-threads = 1 }

[[profile.default.overrides]]
filter = "test(io::qplib::tests::test_parse_existing_qplib_files_regression) + test(io::qplib::tests::test_memory_sentinel_no_double_hashmap_qplib8500) + test(io::qplib::tests::test_parse_sweep_no_memory_accumulation)"
test-group = "qplib-memory-heavy"
