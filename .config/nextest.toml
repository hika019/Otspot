[profile.default]
# doctest は nextest 非対応 → `cargo test --doc` で別途実行。
# ローカル開発は 6 スレッド、GitHub Actions は 3 (ユーザ指示 2026-07-06)。
# CI は ci.yml/test-heavy.yml が --test-threads 3 を明示指定して override する。
test-threads = 6
# slow-timeout.period 60s, terminate-after 5 → 300s で kill。
# tier-2 sentinel (pilot87 ~142s, ken18 ~62s 等) を default で実走させるため
# CLAUDE.md L33 3min cap を超えるが、tier-2 個別 override で 60s/180s に戻す道もある。
# 真の長期 test (d6cube ~286s 等) は #[ignore = "broken: ..."] で除外済。
slow-timeout = { period = "60s", terminate-after = 5 }

# bench data 不在環境で lib/bin のみ走らせる用。integration は data を assert で要求。
# CI もこのプロファイルを使用 (data/ gitignored)。
[profile.lib-only]
default-filter = "kind(lib) + kind(bin)"
test-threads = 3
slow-timeout = { period = "60s", terminate-after = 2 }

# faer per-call parallelism sentinel (#31): the asserts are deterministic
# (thread-count + seq/par solution agreement, no wall-ratio assert), so this
# override is not needed for correctness. It is retained to avoid CPU
# oversubscription: each test runs a CPU-bound n=1500 dense factorization, so
# threads-required = "num-cpus" schedules them exclusively rather than letting
# several stack onto the same cores.
[[profile.default.overrides]]
filter = "test(linalg::par_sentinel::)"
threads-required = "num-cpus"

# greenbea_postsolve_dual_feasibility: idle ~164s で converge、170s margin 6s。
# #91 で CPU contention 1.04x でも FAIL することを実証 (threads-required では不十分) →
# #[ignore] 復活で default 除外。本 override は `--run-ignored only` 時に CPU 専有で安定化させる用途。
[[profile.default.overrides]]
filter = "test(lp_regression_postsolve_y_dual::greenbea_postsolve_dual_feasibility)"
threads-required = "num-cpus"

# lp_simplex_stall_synthetic_large_lp_dispatches_to_valid_incumbent: 2500×3500 sparse LP
# solved by simplex; needs ~11s solo but times out at 30s budget under CPU contention
# from other tests. Run exclusively so faer parallelism gets all cores.
[[profile.default.overrides]]
filter = "test(lp_simplex_stall_synthetic_large_lp_dispatches_to_valid_incumbent)"
threads-required = "num-cpus"

# test_step7_free_var_fillin_must_not_blow_up: 10502-var / 10500-constraint LP presolve
# timing test. Solo: ~0.85-1.15s (under 1.0s budget). Under CPU contention from parallel
# tests it spikes to 4-5s and fails. Run exclusively to ensure fair timing.
[[profile.default.overrides]]
filter = "test(presolve::transforms::tests::test_step7_free_var_fillin_must_not_blow_up)"
threads-required = "num-cpus"

# 旧 tier-2 を default に promote した tests に per-test 高負荷 override を追加。
# heavy profile からそのまま移植 (default で fairness を確保)。
[[profile.default.overrides]]
filter = "test(pilot87_presolve_false_not_infeasible)"
threads-required = "num-cpus"

[[profile.default.overrides]]
filter = "test(diag_greenbea_presolve_off_baseline)"
threads-required = "num-cpus"

[[profile.default.overrides]]
filter = "test(dfl001_postsolve_skips_lsq_when_cleanup_stagnant) + test(diag_pds20_deadline_regression_guard)"
threads-required = "num-cpus"

# cycle.QPS promoted into default integration includes two long solver-budget
# guards (120s / 250s). They keep the data-missing panic semantics, but should
# not contend with other CPU-bound integration tests under the default thread pool.
[[profile.default.overrides]]
filter = "test(diag_cycle_must_reach_known_objective) + test(diag_cycle_is_feasible_and_near_optimal)"
threads-required = "num-cpus"

# warm_start_30pct_speedup_smoke: wall-ratio assert (< 0.75) is sensitive to
# CPU contention — serialise to give the wall measurement a fair comparison.
[[profile.default.overrides]]
filter = "test(warm_start_30pct_speedup_smoke)"
threads-required = "num-cpus"

# osa-60 perf sentinel solves against a 60s internal deadline in ~20.7s single-job
# (margin ~2.9x / ~39s absolute). Serialise it: threads-required caps nextest's own
# thread pool but NOT other host processes, so the ~39s cushion — far thicker than
# greenbea's ~6s, which still flaked 1.04x under contention — is the real guard. If a
# future change shrinks it, revisit the deadline/budget rather than loosening asserts.
[[profile.default.overrides]]
filter = "test(diag_osa60_must_reach_known_objective)"
threads-required = "num-cpus"

# Memory-heavy qplib parse tests peak 100-800 MB each (QPLIB_8500 = 100 MB,
# QPLIB_8683 = ~50 MB post-fix, QPLIB_8547/9008 DCL = ~700 MB).
# Running them concurrently stacks memory and can thrash (swap=0) or trip
# slow-timeout.  Serialize so at most one runs at a time.
[test-groups]
qplib-memory-heavy = { max-threads = 1 }
memory-budget = { max-threads = 1 }

[[profile.default.overrides]]
filter = "test(qplib::tests::test_parse_existing_qplib_files_regression) + test(qplib::tests::test_memory_sentinel_no_double_hashmap_qplib8500) + test(qplib::tests::test_parse_sweep_no_memory_accumulation) + test(qplib::tests::test_memory_probe_large_dcl_files) + test(qplib::tests::test_memory_sentinel_qplib8683_qcqp) + test(qplib::tests::test_qcqp_sparse_init_memory_bounded)"
test-group = "qplib-memory-heavy"

# memory_budget.rs (otspot-core/tests + otspot-model/tests): every peak-allocation
# fence, serialized. Budgets sum to ~4.4 GB, and a regression allocates its way to
# the ceiling *before* the post-solve assert fires, so concurrent fences can exhaust
# RAM and take the whole test run (or its cgroup) down with an OOM kill.
# Matched by binary, not by test name: a name list silently omits fences added later
# — it had already drifted to 4 of 7. Measurement correctness does not depend on this
# grouping: each test holds an in-binary Mutex for its measure window (see the file's
# module doc comment).
[[profile.default.overrides]]
filter = "binary(memory_budget)"
test-group = "memory-budget"

# Heavy/nightly profile: runs ALL tests including #[ignore]d heavy ones.
#
# Usage:
#   cargo nextest run --workspace --profile heavy --run-ignored all
#
# run-ignored は nextest profile キーとして無効 (unknown key warning が出る)。
# #[ignore] テストを含めるには CLI フラグ `--run-ignored all` を必ず付けること。
#
# Tier 分類 (#97):
#   - tier-1 (< 30s Mac / < 12s Mac): デフォルト実行 (default profile)
#   - tier-2 (Mac 12-180s / CI 2.5x 30-450s): #[ignore = "tier-2"] + heavy profile
#   - tier-3 (> 180s Mac): 既存 #[ignore] 維持
#
# Tests gated here include: DSE pivot sentinel (~150s), lp_classify_1000s
# (~30s–600s each), lp_coverage_screen (~5-6 min), ken-18/osa-60 (~60s each),
# lp_regression heavy LPs.
# tier-2 追加 (#97): greenbea presolve-off (~88s), pilot87 (~142s),
# dfl001 postsolve (~60s), pds-20 (~62s), ken18/ken13/ken11 (~28-34s),
# liswet family (~20s), nonconvex kkt (~20s), qap15 (~18s),
# liswet9 complementarity (~16s), kkt_repro_50 (~16s), klein3 (~12-14s),
# dfl001 forced simplex (~30s), prop_nonconvex_constrained (~29s).
[profile.heavy]
test-threads = 6
slow-timeout = { period = "300s", terminate-after = 2 }

# lp_coverage_screen: 90 LP screen ~5–6 min — raise kill ceiling to 12 min.
[[profile.heavy.overrides]]
filter = "test(lp_coverage_screen_all)"
slow-timeout = { period = "360s", terminate-after = 2 }

# DSE pivot sentinel tests: ~150s each (6 Netlib × 2 arms × 90s timeout cap).
# Serialise to avoid env-var (DSE_DISABLE_GAMMA_UPDATE) cross-contamination.
[[profile.heavy.overrides]]
filter = "test(dse_iter_count_matches_or_beats_most_infeasible) + test(dse_with_gamma_update_disabled_collapses_to_most_infeasible) + test(dse_correct_status_across_perturbations)"
threads-required = "num-cpus"

# pilot87 presolve=false (~142s): primal Phase I cycling + Big-M. Raise kill
# ceiling to 5 min (well above the 150s solver budget).
[[profile.heavy.overrides]]
filter = "test(pilot87_presolve_false_not_infeasible)"
slow-timeout = { period = "60s", terminate-after = 5 }
threads-required = "num-cpus"

# greenbea presolve=off (~88s): raise kill ceiling to 3 min.
[[profile.heavy.overrides]]
filter = "test(diag_greenbea_presolve_off_baseline)"
slow-timeout = { period = "60s", terminate-after = 4 }
threads-required = "num-cpus"

# dfl001 postsolve speedup (~60s) and pds-20 deadline guard (~62s): raise to 3 min.
[[profile.heavy.overrides]]
filter = "test(dfl001_postsolve_skips_lsq_when_cleanup_stagnant) + test(diag_pds20_deadline_regression_guard)"
slow-timeout = { period = "60s", terminate-after = 3 }
threads-required = "num-cpus"

# greenbea_postsolve_under_5s: postsolve は solo 3.94s (<5s) だが --test-threads 3 contention 下
# では 6.30s に膨らみ閾値超過 (#39, --no-fail-fast で露出)。default profile の同種 override
# (threads-required) が heavy には無く contention 化していた。CPU 専有で公平な timing にする。
[[profile.heavy.overrides]]
filter = "test(greenbea_postsolve_under_5s)"
threads-required = "num-cpus"

# lp_simplex_stall_synthetic_large_lp_dispatches_to_valid_incumbent: default profile と同様に
# CPU 専有で fair timing にする (heavy の他テストとの contention 対策)。
[[profile.heavy.overrides]]
filter = "test(lp_simplex_stall_synthetic_large_lp_dispatches_to_valid_incumbent)"
threads-required = "num-cpus"

# Netlib route/pricing sentinels: 内部 solver budget 1000s に対し heavy 既定の
# kill (300s×2=600s) が先に発火する契約矛盾を解消する。実測 solo: dfl001 344s /
# ken-18 63s / ken-13 simplex 直行 131s。CI 3-thread 相当 (~2.5x) で dfl001
# ≈ 860s < budget 1000s < kill 1200s (300s×4)。CPU 専有で fair timing。
[[profile.heavy.overrides]]
filter = "test(=lp_route_dfl001_uses_ipm_dispatch) + test(=lp_route_ken18_uses_ipm_dispatch) + test(=lp_route_pds20_uses_bounded_eq_ub) + test(=lp_bounded_eq_ub_ken13_pricing_efficiency_via_lp_entry)"
slow-timeout = { period = "300s", terminate-after = 4 }
threads-required = "num-cpus"

