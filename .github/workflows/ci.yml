name: CI

on:
  push:
    branches: ["**"]
  pull_request:

# Cancel superseded in-progress runs for the same ref (e.g. rapid pushes to a
# feature branch). PR vs push runs use distinct refs, so both still execute.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    # No rust-cache here: `cargo fmt` does not compile, so a build cache is a
    # no-op for this job.
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      # Informational only: ~223/261 files are currently unformatted and a
      # global `cargo fmt` would collide with the in-flight feature branches.
      # Flip to blocking (drop continue-on-error) after the branch wave lands
      # and a one-shot repo-wide fmt is applied.
      - run: cargo fmt --check
        continue-on-error: true

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # Warning budget (~262 warnings) is tracked separately; -D warnings deferred.
      - run: cargo clippy --workspace --all-targets --all-features

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      # data/ is gitignored and absent in CI. Integration tests that reference
      # data/ panic on missing files rather than skipping gracefully, so we
      # run only lib + bin targets via the lib-only nextest profile.
      # test-threads=3 is set in the profile (matches CLAUDE.md spec).
      - name: Unit tests (lib-only profile; data-dependent tests skipped)
        run: cargo nextest run --workspace --profile lib-only
      - name: Doctests
        run: cargo test --doc --workspace

  package:
    name: package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # --no-verify skips build: verifies metadata and file inclusion only.
      # Verify all published crates (otspot-core, otspot-io, otspot-model, otspot facade).
      - run: cargo package --no-verify -p otspot-core
      - run: cargo package --no-verify -p otspot-io
      - run: cargo package --no-verify -p otspot-model
      - run: cargo package --no-verify -p otspot
