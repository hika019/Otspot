name: CI

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  test-lib:
    name: Tests (lib unit, fast)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - run: cargo nextest run --release --features parallel --profile lib-only

  test-integration:
    name: Tests (integration, real data)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/cache@v5
        id: cache
        with:
          path: data/
          # NOTE: 手動 version pin。データシェイプ変更時のみ bump。script の
          # 自動 hash は cache を不要に bust しがちで、netlib 不安定時に CI が
          # 復旧不能となるリスクがあるため。
          key: bench-data-v1
          # 旧 hash-based key (bench-data-{md5}) の cache を fallback で活用。
          # netlib 不通時に v1 が無くても過去成功 run の cache から復元できる。
          restore-keys: |
            bench-data-
      - name: Restore git-tracked baselines (cache 上書き対策)
        run: git checkout HEAD -- data/baseline_objectives/
      - name: Install python deps for data generation
        run: pip install 'numpy==1.26.*' 'scipy==1.13.*' 'cvxpy==1.5.*'
      - name: Build emps decoder (Netlib LP data 変換用)
        if: steps.cache.outputs.cache-hit != 'true'
        run: bash scripts/ensure_emps.sh
      - name: Download CI subset (~1.2 GiB)
        run: bash scripts/download_all_bench_data.sh --ci-subset
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      # default profile = ignore以外の全テスト (lib + bin + test、 旧 tier-2 promote 含む)
      # --no-fail-fast: 1 件目の fail で打ち切らず全 fail を surface
      - run: cargo nextest run --release --features parallel --no-fail-fast

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  docs:
    name: docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: Swatinem/rust-cache@v2
      - run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps

  package:
    name: package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo package --workspace --no-verify

  file-size:
    name: file-size
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: bash scripts/check_file_size.sh

  unused-deps:
    name: unused-deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-machete
      - run: cargo machete

  public-api:
    name: public-api
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly-2026-05-01
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-public-api
      - name: Diff public API against main
        env:
          RUSTUP_TOOLCHAIN: nightly-2026-05-01
        run: cargo public-api diff origin/main..HEAD

  todo-budget:
    name: todo-budget
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: count TODO/FIXME
        run: |
          COUNT=$(grep -rE 'TODO|FIXME|XXX|HACK' otspot-core/src otspot-io/src otspot-model/src otspot-dev/src src 2>/dev/null | wc -l)
          echo "todo_count=$COUNT"
          # CLAUDE.md L37「コードにメモ書きコメント禁止」を CI で enforce。
          # TODO/FIXME = 未完成 marker = push 時点で意図的不具合、1 件でも混入で fail。
          if [ "$COUNT" -gt 0 ]; then
            echo "::error::TODO/FIXME/XXX/HACK count $COUNT > 0 — CLAUDE.md L37 違反 (メモ書きコメント禁止)"
            exit 1
          fi
