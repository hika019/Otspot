name: CI (heavy)

# tier-2 sentinel gate (#97 で #[ignore = "tier-2"] 化した 20 test を復活させる).
# 通常 push/PR では起動しない (CI 時間爆発回避)。
# トリガ:
#   1. nightly cron (毎日 18:00 UTC = JST 翌 03:00)
#   2. workflow_dispatch (手動実行)
#   3. push で commit message に "[heavy]" を含む場合
on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:
  push:
    branches: ["**"]

jobs:
  test-heavy:
    name: Tests (heavy, tier-2 sentinel)
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' &&
       contains(github.event.head_commit.message, '[heavy]'))
    steps:
      - uses: actions/checkout@v6
      - uses: actions/cache@v4
        id: cache
        with:
          path: data/
          key: bench-data-${{ hashFiles('scripts/*.sh', 'scripts/gen_*.py') }}
      - name: Install python deps for data generation
        run: pip install 'numpy==1.26.*' 'scipy==1.13.*' 'cvxpy==1.5.*'
      - name: Build emps decoder (Netlib LP data 変換用)
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          curl -s https://www.netlib.org/lp/data/emps.c -o /tmp/emps.c
          cc -o /tmp/emps /tmp/emps.c
      - name: Download CI subset
        run: bash scripts/download_all_bench_data.sh --ci-subset
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - name: Run heavy (tier-2) tests
        # `--run-ignored all` は known-failing + data-missing も含めて全 ignored test を起動する。
        # 永久 RED 化を避けるため、下記 test を明示 exclude する。
        # LIST SYNC 注意: known-failing は `grep 'ignore = "known failing' tests/`、
        # data-missing は CI subset に未含の data を要求する test を sync すること。
        # 解除条件は各 test の ignore message 参照。
        #
        # known-failing (LP/QP perf 未対応、remove ignore when #75 lands):
        #   liswet9_objective_matches_clarabel, yao_objective_matches_clarabel,
        #   diag_osa60_must_reach_known_objective, diag_ken18_must_respect_internal_deadline
        #
        # data-missing (CI subset に lp_problems_hard / osqp_bench_illscaled 未含):
        #   timeout_honored_on_neos_bigm_cold_start (requires data/lp_problems_hard/neos.QPS)
        #   qp_is_lasso_300_real_data_honors_deadline (requires data/osqp_bench_illscaled/IS_LASSO_300_S33_E5.qplib)
        #
        # flaky (CPU contention 依存、170s margin 6s で CI 環境では不安定):
        #   greenbea_postsolve_dual_feasibility
        run: |
          cargo nextest run --release --profile heavy --run-ignored all \
            -E 'kind(test) and not (test(=liswet9_objective_matches_clarabel) | test(=yao_objective_matches_clarabel) | test(=diag_osa60_must_reach_known_objective) | test(=diag_ken18_must_respect_internal_deadline) | test(=timeout_honored_on_neos_bigm_cold_start) | test(=qp_is_lasso_300_real_data_honors_deadline) | test(=greenbea_postsolve_dual_feasibility))' \
            --test-threads 1
