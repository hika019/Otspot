name: CI (heavy)

# tier-2 sentinel gate (#97 で #[ignore = "tier-2"] 化した 20 test を復活させる).
# トリガ (user policy 3b97a37):
#   1. 全 branch push で auto-run (cron 廃止、push 必ず走らせる)
#   2. workflow_dispatch (Actions tab "Run workflow" ボタン)
on:
  workflow_dispatch:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test-heavy:
    name: Tests (heavy, tier-2 sentinel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # rust-toolchain + nextest install を Download 前に配置: Download が
      # netlib intermittent で fail しても `if: always()` の test step が
      # `nextest 不在` で死なないようにする。
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - uses: actions/cache@v4
        id: cache
        with:
          path: data/
          key: bench-data-v1
          restore-keys: |
            bench-data-
      - name: Restore git-tracked baselines (cache 上書き対策)
        run: git checkout HEAD -- data/baseline_objectives/
      - name: Install python deps for data generation
        run: pip install 'numpy==1.26.*' 'scipy==1.13.*' 'cvxpy==1.5.*'
      - name: Build emps decoder (Netlib LP data 変換用)
        if: steps.cache.outputs.cache-hit != 'true'
        run: bash scripts/ensure_emps.sh
      - name: Download CI subset
        run: bash scripts/download_all_bench_data.sh --ci-subset
      - name: Run heavy (broken/flaky/permanent surveillance) tests
        # Informational surveillance: ignored/heavy tests are not required to pass on CI.
        # Non-ignored tests are gated by ci.yml; keep surfacing all ignored results here.
        continue-on-error: true
        run: |
          cargo nextest run --release --features parallel --profile heavy \
            --run-ignored all --no-fail-fast --test-threads 3
      - name: Run heavy convergence sentinels (surveillance)
        # Informational surveillance for convergence sentinels; results are surfaced but non-gating.
        # budget/tol は diag_lp_simplex_stall_sentinel.rs 参照。
        # if: always() — setup failure 後も収束結果を surface する。
        if: always()
        continue-on-error: true
        run: |
          cargo nextest run --release --profile heavy --run-ignored all --no-fail-fast \
            -E 'test(=lp_simplex_stall_cre_b_converges) | test(=lp_simplex_stall_d6cube_converges) | test(=lp_simplex_stall_pilot_converges)' \
            --test-threads 3
