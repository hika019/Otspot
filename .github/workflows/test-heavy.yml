name: CI (heavy)

# tier-2 sentinel gate (#97 で #[ignore = "tier-2"] 化した 20 test を復活させる).
# トリガ (user policy 3b97a37):
#   1. 全 branch push で auto-run (cron 廃止、push 必ず走らせる)
#   2. workflow_dispatch (Actions tab "Run workflow" ボタン)
on:
  workflow_dispatch:
  push:
    branches: ["**"]

jobs:
  test-heavy:
    name: Tests (heavy, tier-2 sentinel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # rust-toolchain + nextest install を Download 前に配置: Download が
      # netlib intermittent で fail しても `if: always()` の test step が
      # `nextest 不在` で死なないようにする。
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - uses: actions/cache@v4
        id: cache
        with:
          path: data/
          key: bench-data-v1
          restore-keys: |
            bench-data-
      - name: Restore git-tracked baselines (cache 上書き対策)
        run: git checkout HEAD -- data/baseline_objectives/
      - name: Install python deps for data generation
        run: pip install 'numpy==1.26.*' 'scipy==1.13.*' 'cvxpy==1.5.*'
      - name: Build emps decoder (Netlib LP data 変換用)
        if: steps.cache.outputs.cache-hit != 'true'
        run: bash scripts/ensure_emps.sh
      - name: Download CI subset
        run: bash scripts/download_all_bench_data.sh --ci-subset
      - name: Run heavy (broken/flaky/permanent surveillance) tests
        # tier-2 廃止後の構造: default profile が ignore 以外を全実走するため、
        # heavy profile は #[ignore = "broken: ..."] / "flaky: ..." / "permanent ignore"
        # で残った tests を `--run-ignored all` で起動するサーベイランス用途。
        # broken/flaky は known-failing なので exit 100 が想定通り (CI RED 必然)。
        # 解除条件: 各 test の ignore message 参照、 broken→fix or flaky→stabilize 後に attr 除去。
        run: |
          cargo nextest run --release --features parallel --profile heavy \
            --run-ignored all --no-fail-fast --test-threads 1
      - name: Run heavy convergence sentinels (serial, full CPU)
        # cre-b/d6cube/pilot は厳密最適に収束 (harris bench 1000s 逐次, obj_err 0.000%) するが
        # quiet 収束時間が長く、--test-threads 3 の contention 下では BUDGET=360s でも未収束化する。
        # full CPU (--test-threads 1) で公平に走らせ収束を確認する (REL_TOL=5e-3 の収束-truth assert
        # は維持; budget/tol は diag_lp_simplex_stall_sentinel.rs 参照)。
        # if: always() — 前 step が fail しても本 step を必ず走らせ収束結果を surface する。
        if: always()
        run: |
          cargo nextest run --release --profile heavy --run-ignored all --no-fail-fast \
            -E 'test(=lp_simplex_stall_cre_b_converges) | test(=lp_simplex_stall_d6cube_converges) | test(=lp_simplex_stall_pilot_converges)' \
            --test-threads 1
