name: CI (heavy)

# tier-2 sentinel gate (#97 で #[ignore = "tier-2"] 化した 20 test を復活させる).
# トリガ:
#   1. nightly cron (毎日 18:00 UTC = JST 翌 03:00)
#   2. workflow_dispatch (手動実行 — Actions tab "Run workflow" ボタン)
#
# push trigger は意図的に除外 (job-level if: で skip すると Actions tab に
# "skipped" run が大量表示されノイズになるため、workflow 自体を起動させない)。
# 手動 heavy 実行が必要なら workflow_dispatch を使う。
on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  test-heavy:
    name: Tests (heavy, tier-2 sentinel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/cache@v4
        id: cache
        with:
          path: data/
          key: bench-data-${{ hashFiles('scripts/*.sh', 'scripts/gen_*.py') }}
      - name: Install python deps for data generation
        run: pip install 'numpy==1.26.*' 'scipy==1.13.*' 'cvxpy==1.5.*'
      - name: Build emps decoder (Netlib LP data 変換用)
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          curl -s https://www.netlib.org/lp/data/emps.c -o /tmp/emps.c
          cc -o /tmp/emps /tmp/emps.c
      - name: Download CI subset
        run: bash scripts/download_all_bench_data.sh --ci-subset
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - name: Run heavy (tier-2) tests
        # `--run-ignored all` は known-failing も含めて全 ignored test を起動する。
        # 永久 RED 化を避けるため、下記 known-failing test (`#[ignore = "known failing: ..."]`
        # 付き) を明示 exclude する。LIST SYNC 注意: tests/ で
        # `grep 'ignore = "known failing' tests/` した結果と一致させること。
        # 解除条件は各 test の ignore message 末尾 `remove ignore when #<task> ...` 参照。
        run: |
          cargo nextest run --release --profile heavy --run-ignored all \
            -E 'kind(test) and not (test(=liswet9_objective_matches_clarabel) | test(=yao_objective_matches_clarabel) | test(=diag_osa60_must_reach_known_objective) | test(=diag_ken18_must_respect_internal_deadline))' \
            --test-threads 1
