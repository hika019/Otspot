name: Audit

on:
  push:
    branches: [main]
  pull_request:

jobs:
  audit:
    name: audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - run: cargo audit
      - name: data coverage sentinel
        run: python3 tests/test_check_data_coverage.py

  comment-hygiene:
    name: comment-hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Production memo-comment grep gate
        run: |
          set -e
          HITS=$(grep -rnE '(TODO|FIXME|XXX|HACK)' \
            otspot-core/src otspot-io/src otspot-model/src otspot-dev/src \
            --include='*.rs' \
            | grep -vE '#\[cfg\(test\)\]|mod tests' \
            | grep -vE 'tests/.*\.rs:' \
            || true)
          if [ -n "$HITS" ]; then
            echo "::error::Production code must not contain TODO/FIXME/XXX/HACK (CLAUDE.md L46)"
            echo "$HITS"
            exit 1
          fi
      - name: Comment block size check
        run: bash scripts/check_comment_block_size.sh
      - name: Comment ratio check
        run: bash scripts/check_comment_ratio.sh
