name: Audit

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  audit:
    name: audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: taiki-e/install-action@nextest
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - run: cargo audit
      - name: data coverage sentinel
        run: python3 tests/test_check_data_coverage.py
      - name: test data requirements sentinel
        run: python3 tests/test_check_test_data_requirements.py
      - name: ISO 25010 quality matrix sentinel
        run: python3 tests/test_iso_25010_quality_matrix.py
      # Hermetic gate-logic sentinel (no cargo). The real inventory gate
      # runs in ci.yml's test-integration job, where the test binaries are
      # already built; running it here would force a cold release build.
      - name: test inventory gate unit tests
        run: python3 tests/test_check_new_ignore_attrs.py

  comment-hygiene:
    name: comment-hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Production memo-comment grep gate
        run: bash scripts/lib/check_memo_grep.sh
      - name: Comment block size check
        run: bash scripts/check_comment_block_size.sh
      - name: Comment ratio check
        run: bash scripts/check_comment_ratio.sh
      - name: Dead issue-ref check
        run: python3 scripts/lib/check_dead_issue_refs.py
      - name: Dead issue-ref gate self-test
        run: python3 tests/test_check_dead_issue_refs.py
