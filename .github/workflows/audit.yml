name: Audit

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'Cargo.lock'
      - 'Cargo.toml'
      - 'otspot-*/Cargo.toml'

jobs:
  audit:
    name: audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - run: cargo audit
      - name: data coverage sentinel
        run: python3 tests/test_check_data_coverage.py
