[package]
name = "otspot"
version = "0.1.0"
edition = "2021"
license = "AGPL-3.0-only"
description = "Mathematical optimization solver — LP (Revised Simplex) and QP (Interior Point / Mehrotra predictor-corrector)"
readme = "README.md"
keywords = ["linear-programming", "quadratic", "interior-point", "simplex", "optimization"]
repository = "https://github.com/hika019/otspot"
homepage = "https://github.com/hika019/otspot"
categories = ["science", "algorithms", "mathematics"]

# crates.io 公開パッケージはライブラリのみ。data/ 等は .gitignore で自動除外。
# 追加で tracked の内部成果物 (bin / 統合テスト / benches / examples / scripts /
# インラインテスト / dev 設定) を除外する。
exclude = [
    "/src/bin",
    "/src/test_kkt.rs",
    "/tests",
    "/benches",
    "/examples",
    "/scripts",
    "/data",
    "/.config",
    "/CLAUDE.md",
    "/Dockerfile.dev",
    "/.dockerignore",
    "/cspell.json",
    "**/tests",
    "**/tests.rs",
    "**/tests_*.rs",
]

[features]
default = []
# `parallel` 機能フラグは後方互換のため残置 (no-op)。rayon は必須依存に昇格
# (#5 Phase 2 multi-start で常時 ThreadPool が必要)。
# 既存 `#[cfg(feature="parallel")]` 配下の heavy parallel テストは opt-in 維持。
parallel = []

[dependencies]
faer = "0.24.0"
log = "0.4"
mimalloc = { version = "0.1", default-features = false }
rayon = "1"
twofloat = "0.8"

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }
proptest = "1.10.0"
clarabel = "0.11"
tempfile = "3"

[[bin]]
name = "mip_speed_bench"
path = "src/bin/mip_speed_bench/main.rs"

[[bench]]
name = "scaling_pricing"
harness = false

[[bench]]
name = "lu_bench"
harness = false

[[bench]]
name = "solve_bench"
harness = false

[[bench]]
name = "qp_bench"
harness = false

[profile.test]
opt-level = 3
