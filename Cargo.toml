[package]
name = "solver"
version = "0.1.0"
edition = "2021"
license = "AGPL-3.0-only"
description = "A high-performance linear programming solver using the Revised Simplex method with sparse LU decomposition"
readme = "README.md"
keywords = ["linear-programming", "optimization", "simplex", "operations-research", "lp"]
categories = ["science", "algorithms", "mathematics"]

[features]
default = []
parallel = ["dep:rayon"]

[dependencies]
faer = "0.24.0"
log = "0.4"
mimalloc = { version = "0.1", default-features = false }
rayon = { version = "1", optional = true }
twofloat = "0.8"

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }
proptest = "1.10.0"
clarabel = "0.11"
tempfile = "3"

[[bench]]
name = "scaling_pricing"
harness = false

[[bench]]
name = "lu_bench"
harness = false

[[bench]]
name = "solve_bench"
harness = false

[[bench]]
name = "qp_bench"
harness = false

[profile.test]
opt-level = 3
