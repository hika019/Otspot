[package]
name = "solver"
version = "0.1.0"
edition = "2021"
license = "Apache-2.0 OR MIT"
description = "A high-performance linear programming solver using the Revised Simplex method with sparse LU decomposition"
readme = "README.md"
keywords = ["linear-programming", "optimization", "simplex", "operations-research", "lp"]
categories = ["science", "algorithms", "mathematics"]

[dependencies]

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }
proptest = "1.10.0"

[[bench]]
name = "scaling_pricing"
harness = false

[[bench]]
name = "lu_bench"
harness = false

[[bench]]
name = "solve_bench"
harness = false

[[bench]]
name = "qp_bench"
harness = false
