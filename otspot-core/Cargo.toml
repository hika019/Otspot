[package]
name = "otspot-core"
version = "0.1.1"
edition = "2021"
license = "AGPL-3.0-only"
description = "Core implementation for otspot (LP/QP/MIP solver) — published as a dependency of the otspot facade"
repository = "https://github.com/hika019/otspot"
homepage = "https://github.com/hika019/otspot"

[features]
default = []
# `parallel` feature flag preserved for forward compat (no-op; rayon is a hard dep).
parallel = []

[dependencies]
faer = "0.24.0"
log = "0.4"
mimalloc = { version = "0.1", default-features = false }
rayon = "1"
twofloat = "0.8"

[dev-dependencies]
proptest = "1.10.0"
criterion = { version = "0.5", features = ["html_reports"] }
clarabel = "0.11"
tempfile = "3"

